# Intent Engineering — architecture thresholds (GLOBAL DEFAULTS)
#
# Used by ie-architecture-reviewer to flag structural smells. These are deliberately
# generous starting points — tune per codebase in `.intense/thresholds.yaml`. A
# threshold is a SIGNAL, not a verdict: the lens still judges responsibilities, not
# just counts. See resources/frameworks/<stack>-architecture.md (rails-architecture.md,
# python-architecture.md) for what each smell means.
version: 1

rails:
  model:
    max_loc: 200              # fat-model signal
    max_public_methods: 20
    max_associations: 15
    max_callbacks: 5          # callback-hell signal
  controller:
    max_loc: 150              # fat-controller signal
    max_action_loc: 20        # business logic leaking into actions
    max_actions: 12           # well beyond RESTful 7
  service_object:
    max_public_methods: 1     # a service should expose ONE call (`call`/`perform`)
    max_loc: 120              # a service this big is a God object in disguise
  god_object:
    max_collaborators: 15     # distinct classes referenced/instantiated
    max_loc: 300
  helper:
    max_loc: 100              # fat-helper signal
  general:
    max_method_loc: 25
    max_method_abc: 25        # ABC/flog score, only if flog is available

python:
  module:
    max_loc: 400              # god-module signal (whole .py file)
    max_public_functions: 15  # dumping-ground module (top-level defs without leading _)
    max_public_classes: 8
  router:
    max_loc: 150              # fat-router signal (whole router module)
    max_handler_loc: 25       # business logic leaking into a route handler body
    max_routes: 15            # well beyond a cohesive resource's operations
  dependency:
    max_loc: 40               # a Depends() callable should resolve-and-return, not do work
  service:
    max_public_functions: 10  # grab-bag service module (misused-service)
    max_loc: 200              # a service this big is a God object in disguise
  schema:
    max_validators: 5         # business-logic-in-schema signal (field/model validators)
    max_fields: 30            # god schema
  god_object:
    max_collaborators: 15     # distinct classes referenced/instantiated (fan-out)
    max_loc: 300
  general:
    max_function_loc: 50      # long-function signal (PEP 8 / readability)
    max_function_params: 6    # long parameter list -> introduce a dataclass/request object
    max_nesting_depth: 4      # deep if/for nesting -> guard clauses, early returns

laravel:
  controller:
    max_loc: 150              # fat-controller signal (whole controller)
    max_action_loc: 25        # business logic leaking into an action body
    max_actions: 15           # beyond resourceful 7 — but GET form-render twins
                              # (create/store, edit/update, showDelete/destroy) legitimately
                              # double the count, so judge action BODIES, not names
  model:
    max_loc: 200              # fat Eloquent model signal
    max_public_methods: 20
    max_relationships: 15     # hasOne/hasMany/belongsTo/belongsToMany/morph*
    max_scopes: 10            # scopeX methods
  service:
    max_public_methods: 5     # a service is cohesive; an Action should expose ONE
    max_loc: 200              # a service this big is a God object in disguise
  god_class:
    max_collaborators: 15     # distinct classes referenced/instantiated (fan-out)
    max_loc: 300
  view:
    max_loc: 100              # fat view composer signal
  general:
    max_method_loc: 30        # long-method signal
    max_method_params: 6      # long parameter list -> introduce a DTO / data object

express:
  route:
    max_loc: 150              # fat router file
    max_handler_loc: 25       # business logic leaking into a route handler
    max_routes: 20            # one router owning too many routes
  controller:
    max_loc: 150              # fat controller module
    max_handler_loc: 25       # logic leaking into a controller action
  service:
    max_public_methods: 10    # grab-bag service module
    max_loc: 200              # a service this big is a God object in disguise
  module:
    max_loc: 400              # god-module signal (whole file)
    max_exports: 15           # dumping-ground module (public exports)
  middleware:
    max_loc: 100              # a middleware should be cross-cutting; real auth/render middleware
                              # runs long — lean on the BEHAVIORAL signal (domain queries, no
                              # next(), shared mutable state), not LOC
  god_object:
    max_collaborators: 15     # distinct modules/classes referenced (fan-out)
    max_loc: 300
  general:
    max_function_loc: 50      # long-function signal
    max_function_params: 6    # long parameter list -> options object / DTO
    max_nesting_depth: 4      # callback hell / pyramid of doom

phoenix:
  controller:
    max_loc: 150              # fat-controller signal (whole controller)
    max_action_loc: 25        # business logic leaking into an action
    max_actions: 12           # beyond a cohesive resource's actions
  context:
    max_loc: 300              # god-context signal
    max_public_functions: 25  # a context grouping too much
  live_view:
    max_loc: 200              # fat-liveview signal (whole module)
    max_handler_loc: 25       # logic leaking into handle_event/handle_info
  schema:
    max_loc: 150              # fat Ecto schema signal
    max_changeset_loc: 30     # business-logic-in-changeset signal
  module:
    max_loc: 400              # god-module signal (whole module)
    max_public_functions: 20  # dumping-ground module
  general:
    max_function_loc: 40      # long-function signal
    max_function_params: 5    # long parameter list -> struct / keyword opts
    max_nesting_depth: 3      # nested case/cond/with -> with chains, multi-clause

react:
  component:
    max_loc: 150              # god-component signal (whole component)
    max_jsx_depth: 5          # deeply nested JSX -> extract components
    max_props: 10             # too many props / pass-through (prop-drilling)
    max_hooks: 10             # too many hook calls in one component
    max_use_state: 8          # scattered local state -> useReducer / extract
  hook:
    max_loc: 80               # fat custom hook signal
    max_returns: 8            # sprawling hook return surface
  context:
    max_loc: 120              # god-context signal
  module:
    max_loc: 300              # god-module signal (whole file)
    max_exports: 15           # barrel-file / dumping-ground module
  store:
    max_loc: 800              # god-store signal (state-mgmt module / MobX class) — looser than a UI module
    max_observables: 15       # scattered MobX @observable fields across unrelated slices (analog of max_use_state)
    max_actions: 25           # a store class fronting too many operations
  general:
    max_function_loc: 50      # long function/handler signal
    max_function_params: 5    # long parameter list -> props object
    max_nesting_depth: 4      # nested conditionals/ternaries in JSX

# Other stacks inherit nothing yet; add a top-level key when that rule pack lands.
# Unknown stacks fall back to `general` only.
